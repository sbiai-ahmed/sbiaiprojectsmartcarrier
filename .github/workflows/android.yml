name: Android CI/CD

on:
  push:
    branches: [ "main" ] # سيعمل التلقائي عند الرفع على فرع main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :BIZGO:assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug-apk
        path: BIZGO/build/outputs/apk/debug/*.apk
